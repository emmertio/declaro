name: CI

on:
    pull_request:
        branches:
            - develop
            - main
    push:
        branches:
            - develop
            - main

jobs:
    ci:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.2.18

            - name: Cache Bun dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build
              id: build
              run: bun run build 2>&1 | tee build-output.txt
              continue-on-error: true

            - name: Typecheck
              id: typecheck
              run: bun run typecheck 2>&1 | tee typecheck-output.txt
              continue-on-error: true

            - name: Test
              id: test
              run: bun test 2>&1 | tee test-output.txt
              continue-on-error: true

            - name: Integration Tests
              id: integration
              run: cd lib/zod && bun run test:integration 2>&1 | tee ../../integration-output.txt
              continue-on-error: true

            - name: Create PR comment
              if: github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');

                      const buildStatus = '${{ steps.build.outcome }}';
                      const typecheckStatus = '${{ steps.typecheck.outcome }}';
                      const testStatus = '${{ steps.test.outcome }}';
                      const integrationStatus = '${{ steps.integration.outcome }}';

                      const icon = (status) => status === 'success' ? '✅' : '❌';

                      let buildOutput = '';
                      let typecheckOutput = '';
                      let testOutput = '';
                      let integrationOutput = '';

                      try { buildOutput = fs.readFileSync('build-output.txt', 'utf8'); } catch {}
                      try { typecheckOutput = fs.readFileSync('typecheck-output.txt', 'utf8'); } catch {}
                      try { testOutput = fs.readFileSync('test-output.txt', 'utf8'); } catch {}
                      try { integrationOutput = fs.readFileSync('integration-output.txt', 'utf8'); } catch {}

                      const allPassed = buildStatus === 'success' && typecheckStatus === 'success' && testStatus === 'success' && integrationStatus === 'success';
                      const header = allPassed ? '## ✅ CI Passed' : '## ❌ CI Failed';

                      let body = `${header}\n\n`;
                      body += `| Step | Status |\n`;
                      body += `| --- | --- |\n`;
                      body += `| Build | ${icon(buildStatus)} ${buildStatus} |\n`;
                      body += `| Typecheck | ${icon(typecheckStatus)} ${typecheckStatus} |\n`;
                      body += `| Test | ${icon(testStatus)} ${testStatus} |\n`;
                      body += `| Integration | ${icon(integrationStatus)} ${integrationStatus} |\n\n`;

                      // Extract test summary line (e.g. "Ran 553 tests across 45 files")
                      const testSummaryMatch = testOutput.match(/Ran \d+ tests across \d+ files.*/);
                      const passMatch = testOutput.match(/(\d+) pass/);
                      const failMatch = testOutput.match(/(\d+) fail/);

                      if (testSummaryMatch || passMatch) {
                          body += `### Test Summary\n\n`;
                          if (passMatch) body += `- **${passMatch[1]}** passed\n`;
                          if (failMatch && failMatch[1] !== '0') body += `- **${failMatch[1]}** failed\n`;
                          if (testSummaryMatch) body += `- ${testSummaryMatch[0]}\n`;
                          body += `\n`;
                      }

                      // Show details for failed steps
                      const failures = [];
                      if (buildStatus !== 'success') failures.push(['Build', buildOutput]);
                      if (typecheckStatus !== 'success') failures.push(['Typecheck', typecheckOutput]);
                      if (testStatus !== 'success') failures.push(['Test', testOutput]);
                      if (integrationStatus !== 'success') failures.push(['Integration', integrationOutput]);

                      for (const [name, output] of failures) {
                          const truncated = output.length > 3000 ? '…' + output.slice(-3000) : output;
                          body += `<details>\n<summary>${name} output</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n</details>\n\n`;
                      }

                      body += `\n*Commit: ${context.sha.slice(0, 7)}*`;

                      // Find existing CI comment to update
                      const marker = '## ✅ CI Passed';
                      const markerFail = '## ❌ CI Failed';
                      const { data: comments } = await github.rest.issues.listComments({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                      });

                      const existing = comments.find(c =>
                          c.user.login === 'github-actions[bot]' &&
                          (c.body.startsWith(marker) || c.body.startsWith(markerFail))
                      );

                      if (existing) {
                          await github.rest.issues.updateComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              comment_id: existing.id,
                              body,
                          });
                      } else {
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: context.issue.number,
                              body,
                          });
                      }

            - name: Fail if any step failed
              if: steps.build.outcome != 'success' || steps.typecheck.outcome != 'success' || steps.test.outcome != 'success' || steps.integration.outcome != 'success'
              run: exit 1
